    <div class="content-col">
      <header class="page-header">
        <h1>Kevin The Magician</h1>
      </header>

      <main class="page-body">
        <div class="contact-info">
          <p>Email: <a href="mailto:k2aust@gmail.com">k2aust@gmail.com</a></p>
          <p>Phone: <a href="tel:+18608187972">(860) 818-7972</a></p>
        </div>

        <!-- To activate this form: sign up free at formspree.io, create a form, and replace YOUR_FORM_ID below -->
        <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Jane Smith" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-group">
            <label for="event">Type of Event</label>
            <input type="text" id="event" name="event" placeholder="Birthday party, corporate event, school show…">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your event — date, location, number of guests…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </main>

      <footer class="site-footer">
